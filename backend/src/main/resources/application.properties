spring.application.name=demo

# Database (override with environment variables in production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# HTTP Basic Auth credentials for write operations (POST, PUT, DELETE)
spring.security.user.name=${APP_SECURITY_USER:chef}
spring.security.user.password=${APP_SECURITY_PASSWORD:recipe123}

# Optional local overrides (copy application-local.properties.example)
spring.config.import=optional:classpath:application-local.properties
